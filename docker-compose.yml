version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: task_horse
      MYSQL_USER: usama
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  laravel-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taskhorse-api
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_DATABASE: task_horse
      DB_USERNAME: usama
      DB_PASSWORD: secret123
    ports:
      - "8000"                           # internal-only; no public port
    depends_on:
      - mysql-db
    networks:
      - app_network

  react-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskhorse-frontend
    restart: unless-stopped
    ports:
      - "3000"                              # internal-only; no public port
    depends_on:
      - laravel-api
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: taskhorse-nginx
    restart: unless-stopped
    ports:
      - "80:80"                         # public entry point
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - react-frontend
      - laravel-api
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network: